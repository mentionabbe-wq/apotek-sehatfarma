services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: apotek-frontend
    container_name: apotek-frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: apotek-backend
    container_name: apotek-backend
    ports:
      - "3000:3000"
    volumes:
      - apotek-db:/app/data
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=apotek-sehatfarma-secret-ganti-di-produksi

volumes:
  apotek-db:
